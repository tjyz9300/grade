<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>成绩管理系统</title>
    <style>
        body { font-family: SimSun, serif; margin: 20px; background: #fff; }
        h1 { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .nav { text-align: center; margin: 20px 0; }
        .nav a { margin: 0 15px; color: #0066cc; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        th { background: #f0f0f0; }
        .section { margin: 30px 0; }
        .section h2 { font-size: 16px; border-left: 4px solid #333; padding-left: 10px; }
        .info { margin: 10px 0; }
    </style>
</head>
<body>
<h1>成绩管理系统</h1>

<div class="nav">
    <a href="/student/list">学生管理</a> |
    <a href="/teacher/list">教师管理</a> |
    <a href="/course/list">课程管理</a>
</div>

<div class="info">
    <span>学生总数: <span th:text="${#lists.size(students)}"></span>人</span> |
    <span>教师总数: <span th:text="${#lists.size(teachers)}"></span>人</span> |
    <span>课程总数: <span th:text="${#lists.size(courses)}"></span>门</span>
</div>

<div class="section">
    <h2>学生平均成绩</h2>
    <table>
        <tr><th>学号</th><th>姓名</th><th>平均分</th></tr>
        <tr th:each="item : ${studentAvgScores}">
            <td th:text="${item['student_id']}"></td>
            <td th:text="${item['name']}"></td>
            <td th:text="${item['avg_score'] != null} ? ${#numbers.formatDecimal(item['avg_score'], 1, 2)} : '无成绩'"></td>
        </tr>
    </table>
</div>

<div class="section">
    <h2>课程平均成绩</h2>
    <table>
        <tr><th>课程号</th><th>课程名</th><th>平均分</th></tr>
        <tr th:each="item : ${courseAvgScores}">
            <td th:text="${item['course_id']}"></td>
            <td th:text="${item['course_name']}"></td>
            <td th:text="${item['avg_score'] != null} ? ${#numbers.formatDecimal(item['avg_score'], 1, 2)} : '无成绩'"></td>
        </tr>
    </table>
</div>
</body>
</html>

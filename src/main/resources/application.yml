server:
  port: 8080

spring:
  mvc:
    format:
      date: yyyy-MM-dd
  datasource:
    url: jdbc:mysql://localhost:3306/score_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.score.entity
  configuration:
    map-underscore-to-camel-case: true
